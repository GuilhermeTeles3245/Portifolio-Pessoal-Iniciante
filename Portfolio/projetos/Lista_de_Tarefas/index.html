<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Minhas Tarefas</h1>
        
        <div class="input-section">
            <!-- Elementos que você vai precisar capturar no JS -->
            <input type="text" id="nova-tarefa" placeholder="Digite uma nova tarefa...">
            <button id="btn-adicionar">Adicionar</button>
        </div>
        
        <!-- É dentro dessa UL que você vai colocar os itens <li> via JavaScript -->
        <ul id="lista-tarefas">
            
        </ul>
    </div>

    <a href="../../pages/projetos.html" class="btn-voltar">⬅ Voltar aos Projetos</a>
    
    <script src="script.js"></script>
</body>
</html>
